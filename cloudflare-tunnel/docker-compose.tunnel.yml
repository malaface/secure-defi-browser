# Cloudflare Tunnel for Secure DeFi Browser
#
# Provides remote access to the browser via Cloudflare Zero Trust.
# MANDATORY: Configure a Cloudflare Access policy to protect the hostname.
#
# PREREQUISITES:
# 1. Create a tunnel in Cloudflare Dashboard (https://one.dash.cloudflare.com/)
# 2. Download credentials JSON to ~/.cloudflared/
# 3. Replace YOUR_TUNNEL_ID in tunnel-config.yml with the real tunnel ID
# 4. Configure Access policy for your hostname
#
# USAGE:
#   docker compose -f docker-compose.tunnel.yml up -d

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: secure-browser-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./tunnel-config.yml:/etc/cloudflared/config.yml:ro
      - ${CLOUDFLARED_CREDENTIALS_DIR:-~/.cloudflared}:/etc/cloudflared/credentials:ro
    networks:
      - secure-browser
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pgrep cloudflared || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  secure-browser:
    external: true
    name: secure-defi-browser_default
