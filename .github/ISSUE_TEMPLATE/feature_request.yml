name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve Secure DeFi Browser? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve?
      placeholder: "I need to access multiple browser profiles simultaneously..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Related Component
      options:
        - Gluetun (VPN)
        - Brave / KasmVNC (Browser)
        - Caddy (Reverse Proxy)
        - Cloudflared (Tunnel)
        - Docker Compose (General)
        - Documentation
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?
