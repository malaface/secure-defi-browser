# Secure DeFi Browser - Ubuntu Desktop + Gluetun VPN + Caddy + Cloudflare Tunnel
#
# Full Ubuntu desktop remote environment for DeFi/Web3 operations.
# All traffic is routed through a WireGuard VPN tunnel.
# Remote access via Cloudflare Tunnel with Zero Trust authentication.
#
# SECURITY LAYERS:
#   1. Cloudflare Access (Zero Trust) - email OTP/SSO before reaching the server
#   2. Caddy HTTP Basic Auth - username + password on the reverse proxy
#   KasmVNC BasicAuth is disabled to avoid dual Authorization header conflicts.
#
# PREREQUISITES:
# 1. Generate WireGuard credentials from your VPN provider
# 2. Copy .env.example to .env and fill in your credentials
# 3. Generate Caddy Basic Auth hash and paste it in the Caddyfile:
#      docker run --rm caddy:2-alpine caddy hash-password --plaintext 'YOUR_PASSWORD'
# 4. Create a Cloudflare Tunnel and get the token
# 5. Configure an Access policy for your hostname
#
# USAGE:
#   docker compose up -d              # Start all services
#   docker compose logs -f            # View logs
#   docker compose down               # Stop all services

services:
  # ──────────────────────────────────────────────
  # VPN Gateway (Gluetun)
  # All network traffic from the desktop exits here.
  # ──────────────────────────────────────────────
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: secure-browser-gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      # KasmVNC HTTPS - bound to localhost only
      - "127.0.0.1:6901:6901"
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-protonvpn}
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRIES:-Switzerland}
      - FIREWALL_INPUT_PORTS=6901
      - FIREWALL_OUTBOUND_SUBNETS=${FIREWALL_OUTBOUND_SUBNETS:-172.16.0.0/12}
      - DOT=off
      - DNS_ADDRESS=9.9.9.9
      - HEALTH_VPN_DURATION_INITIAL=120s
      - TZ=${TZ:-UTC}
    volumes:
      - gluetun_data:/gluetun
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/v1/vpn/status | grep -q running || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # Ubuntu Desktop (KasmVNC)
  # Full XFCE desktop inside Gluetun's network namespace.
  # Zero direct internet access - everything goes through the VPN.
  # Install any browser (Brave, Chrome, Firefox) and wallet
  # extensions directly from the desktop.
  # ──────────────────────────────────────────────
  desktop:
    image: kasmweb/ubuntu-jammy-desktop:1.16.1
    container_name: secure-browser-desktop
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    shm_size: "2gb"
    environment:
      - VNC_PW=${BROWSER_PASSWORD}
      - VNC_USER=${BROWSER_USER:-user}
      - VNCOPTIONS=-disableBasicAuth
      - KASM_VNC_GEOMETRY=1920x1080
      - TZ=${TZ:-UTC}
    volumes:
      - desktop_home:/home/kasm-user
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "2.0"
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # Reverse Proxy with Basic Auth (Caddy)
  # Security layer 2: requires username + password
  # before proxying traffic to KasmVNC.
  # ──────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: secure-browser-caddy
    restart: unless-stopped
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # Cloudflare Tunnel (Zero Trust Access)
  # Provides remote access without exposing ports to the internet.
  # The tunnel connects outbound to Cloudflare - no inbound ports needed.
  # ──────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: secure-browser-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      gluetun:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gluetun_data:
  desktop_home:
  caddy_data:
